server:
  port: 10012

spring:
  application:
    name: message-board
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

message:
  data:
    path: ./data_10012/messages.json
  sensitive:
    words: 脏话,暴力,敏感词,广告,垃圾,傻逼,操,妈的,他妈,草泥马,废物,白痴
