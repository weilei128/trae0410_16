upstream backend_msg_10012 {
    server 127.0.0.1:10012;
}

server {
    listen 10032;
    server_name localhost;
    
    access_log /opt/message-board-10012/logs/nginx_access.log;
    error_log /opt/message-board-10012/logs/nginx_error.log;
    
    root /var/www/message-board-10022;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /api/ {
        proxy_pass http://backend_msg_10012/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
